# タグ push で各 OS 向けにビルドし、Releases に zip / tar.gz を添付。
# 使い方: git tag v0.1.0 && git push --tags
name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: macos-arm64
            archive: tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            asset_name: macos-x86_64
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: windows-x86_64
            archive: zip
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: linux-x86_64
            archive: tar.gz

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          STAGE="puyopuyo-simulator-${{ matrix.asset_name }}"
          mkdir -p "$STAGE"
          cp "target/${{ matrix.target }}/release/puyopuyo-simulator" "$STAGE/"
          cp -r assets "$STAGE/"
          tar -czf "$STAGE.tar.gz" "$STAGE"

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $stage = "puyopuyo-simulator-${{ matrix.asset_name }}"
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/puyopuyo-simulator.exe" "$stage/"
          Copy-Item -Recurse assets "$stage/"
          Compress-Archive -Path $stage -DestinationPath "$stage.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            *.tar.gz
            *.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: false
